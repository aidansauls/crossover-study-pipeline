# =============================================================================
# pilot_hypothetical_excl_y1_y6.yml
# Hypothetical extended pilot (24 participants) — Y1 and Y6 excluded.
#
# Y1 excluded: non-universal knowledge item; questionable content validity.
# Y6 excluded: extremely low endorsement rate across all participants.
# Full score = all 10 Y items. Restricted score = 8 Y items (no Y1, Y6).
#
# Use with: study_data/pilot_hypothetical/
# Run:  set PIPELINE_CONFIG=config\pilot_hypothetical_excl_y1_y6.yml
#       set STUDY_DATA_PATH=study_data\pilot_hypothetical
#       Rscript R\run_all.R
# =============================================================================

study:
  name: "pilot_hypothetical_excl_y1_y6"
  intervention_label: "AI"
  control_label: "Control"
  form_x_label: "Form X"
  form_y_label: "Form Y"

columns:
  participant_id: "Participant_ID"
  intervention_order: "AI_Order"
  control_order: "Control_Order"
  form_x_order: "X_Order"
  form_y_order: "Y_Order"
  time_taken: "Time_taken"

item_exclusions:
  x: []
  y: [y1, y6]

scores:
  scale_to: 10

analysis:
  alpha: 0.05
  ceiling_threshold: 9.5
  floor_threshold: 0.5

optional_analyses:
  run_time_figures: true
  run_ceiling_effects_figure: true

figures:
  dpi: 300
  width_in: 7.5
  height_in: 5.0
  color_intervention: "#2E8B57"
  color_control: "#CD853F"
  color_period1: "#4682B4"
  color_period2: "#B22222"
