# =============================================================================
# pilot_hypothetical_no_exclusions.yml
# Hypothetical extended pilot (24 participants) — no item exclusions.
#
# Based on the 11-participant pilot with 13 additional hypothetical participants.
# All 10 items scored for both forms.
#
# Use with: study_data/pilot_hypothetical/
# Run:  set PIPELINE_CONFIG=config\pilot_hypothetical_no_exclusions.yml
#       set STUDY_DATA_PATH=study_data\pilot_hypothetical
#       Rscript R\run_all.R
# =============================================================================

study:
  name: "pilot_hypothetical_no_exclusions"
  intervention_label: "AI"
  control_label: "Control"
  form_x_label: "Form X"
  form_y_label: "Form Y"

columns:
  participant_id: "Participant_ID"
  intervention_order: "AI_Order"
  control_order: "Control_Order"
  form_x_order: "X_Order"
  form_y_order: "Y_Order"
  time_taken: "Time_taken"

item_exclusions:
  x: []
  y: []

scores:
  scale_to: 10

analysis:
  alpha: 0.05
  ceiling_threshold: 9.5
  floor_threshold: 0.5

optional_analyses:
  run_time_figures: true
  run_ceiling_effects_figure: true

figures:
  dpi: 300
  width_in: 7.5
  height_in: 5.0
  color_intervention: "#2E8B57"
  color_control: "#CD853F"
  color_period1: "#4682B4"
  color_period2: "#B22222"
